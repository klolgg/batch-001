spring:
  output:
    ansi:
      enabled: ALWAYS
  main:
    web-application-type: none
  # H2 데이터베이스 설정
  datasource:
    username: sa
    password:
    driverClassName: org.h2.Driver
    jdbcUrl: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
  # JPA 설정
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        use_sql_comments: true
  sql:
    init:
      mode: always  # 항상 SQL 스크립트 실행
      schema-locations: classpath:h2/schema.sql  # 스키마 정의
  data:
    mongodb:
      uri: mongodb://localhost:27017/klol
  batch:
    job:
      enabled: false

riot:
  domain: https://asia.api.riotgames.com
  api:
    account-v1:
      account-by-riot-id: /riot/account/v1/accounts/by-riot-id/{gameName}/{tagLine}
    match-v5:
      match-list-by-puuid: /lol/match/v5/matches/by-puuid/{puuid}/ids